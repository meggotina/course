<!DOCTYPE html>
<html>
<head>
  <title>Kurkkumopo</title>
    <style>
    body { margin:0; font-family:sans-serif; }
    nav { background:#1a5c1a; padding:15px; }
    nav a { color:white; margin-right:15px; text-decoration:none; }
    section { padding:40px; }
    
    .menu { display:none; background:#1a5c1a; padding:10px 20px; }
    .menu.open { display:block; }
    .menu a { display:block; color:white; padding:6px 0; text-decoration:none; }
    .hamburger {
      display:none;
      background:none;
      border:none;
      color:white;
      font-size:1.5rem;
      cursor:pointer;
    }


    .menu.open { display:block; }
    .hero {
      text-align:center;
      background:#2e8b2e;
      color:white;
      padding:60px 20px;
    }
    .hero h1 { font-size:2.5rem; margin-bottom:10px; }
    .hero p { font-size:1.1rem; opacity:0.9; margin-bottom:20px; }
    .hero img {
      width:100%;
      max-height:400px;
      object-fit:cover;
      border-radius:8px;
      margin-top:20px;
    }

    .container {
        max-width: 900px;
        margin: auto;
        }
  </style>
</head>
<body>

<button onclick="toggleMenu()">Menu</button>

<div id="menu" class="menu">
  <a href="#home">Home</a><br>
  <a href="#about">About</a>
</div>


<nav style="background:#2e8b2e; padding:10px;">
  <a href="#home" style="color:white; margin-right:15px;">Home</a>
  <a href="#about" style="color:white;">About</a>
</nav>


<section id="home" class="hero">
    <div class="container">
  <h1 style="text-align:center;">Kurkkumopo</h1>
  <img src="https://images.cdn.yle.fi/image/upload/c_crop,h_3375,w_6000,x_0,y_365/ar_1.7777777777777777,c_fill,g_faces,h_431,w_767/dpr_2.0/q_auto:eco/f_auto/fl_lossy/v1728481724/39-1360951670687eb4dc90">
    <p>The legendary Finnish cucumber scooter.</p>
</div>
</section>

<section id="about" >
<div class="container">
  <h2>About</h2>
  <p>Shaped like cucumber, feels like cucumber</p>
  </div>
</section>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>
</body>
</html>
